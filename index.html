<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الاحترافي | النسخة التجريبية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-black-500">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="text-2xl font-bold">Wan Bazar</div>
            
            <div class="flex-1 max-w-md">
                <input type="text" id="searchBar" placeholder="ابحث بين آلاف المنتجات..." 
                       class="w-full p-2 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <button onclick="showCart()" class="relative bg-blue-600 px-6 py-2 rounded-full hover:bg-green-700 transition">
                Carts 🛒
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <div class="bg-white border-b overflow-x-auto py-3">
        <div id="categoryTabs" class="container mx-auto flex gap-4 px-4 whitespace-nowrap text-sm font-bold text-slate-600">
            <button onclick="filterByCategory('الكل')" class="hover:text-blue-600">الكل</button>
            </div>
    </div>

    <main class="container mx-auto p-6">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <div id="cartModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex justify-end">
        <div class="bg-white w-full max-w-md h-full shadow-2xl p-6 flex flex-col">
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="text-xl font-bold">سلتك</h2>
                <button onclick="showCart()" class="text-2xl">&times;</button>
            </div>
            <div id="cartContent" class="flex-1 overflow-y-auto py-4 space-y-4"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between text-xl font-bold mb-4">
                    <span>الإجمالي:</span>
                    <span id="totalPrice">0</span><span> د.ع</span>
                </div>
                <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition">
                    تأكيد الطلب عبر واتساب 💬
                </button>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let cart = [];

        // 1. جلب البيانات
        async function loadData() {
            try {
                const response = await fetch('products.json');
                allProducts = await response.json();
                renderCategories();
                renderProducts(allProducts);
            } catch (e) { console.error("خطأ في تحميل البيانات"); }
        }

        // 2. عرض الأقسام ديناميكياً
        function renderCategories() {
            const cats = ['الكل', ...new Set(allProducts.map(p => p.category))];
            document.getElementById('categoryTabs').innerHTML = cats.map(c => 
                `<button onclick="filterByCategory('${c}')" class="px-4 py-1 rounded-full border hover:bg-blue-50">${c}</button>`
            ).join('');
        }

        // 3. عرض المنتجات
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white border rounded-xl p-3 hover:shadow-lg transition group">
                    <div class="aspect-square bg-gray-100 rounded-lg overflow-hidden mb-3">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    </div>
                    <h3 class="font-bold text-sm h-10 overflow-hidden text-slate-800">${p.name}</h3>
                    <div class="mt-2 flex justify-between items-center">
                        <span class="text-blue-700 font-bold text-sm">${p.price.toLocaleString()} د.ع</span>
                        <button onclick="addToCart(${p.id})" class="bg-blue-100 text-blue-700 p-2 rounded-lg hover:bg-blue-700 hover:text-white transition">+</button>
                    </div>
                </div>
            `).join('');
        }

        // 4. الفلترة والبحث
        document.getElementById('searchBar').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        };

        function filterByCategory(cat) {
            if(cat === 'الكل') return renderProducts(allProducts);
            const filtered = allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        // 5. نظام السلة والواتساب
        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push(p);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const content = document.getElementById('cartContent');
            content.innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg text-sm">
                    <span>${item.name}</span>
                    <span class="font-bold">${item.price.toLocaleString()}</span>
                    <button onclick="cart.splice(${idx},1); updateCartUI();" class="text-red-500">حذف</button>
                </div>
            `).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalPrice').innerText = total.toLocaleString();
        }

        function showCart() { document.getElementById('cartModal').classList.toggle('hidden'); }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("السلة فارغة!");
            const myPhone = "9647504735715"; // استبدل برقمك
            let text = "طلب جديد من المتجر:\n------------------\n";
            cart.forEach((item, i) => text += `${i+1}. ${item.name} (${item.price} د.ع)\n`);
            text += `\n*الإجمالي: ${document.getElementById('totalPrice').innerText} دينار عراقي*`;
            window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(text)}`);
        }

        loadData();
    </script>
</body>
</html>
